version: "2"
sql:
  - schema: "sql/schema"
    queries: "sql/queries"
    engine: "postgresql"
    gen:
      go:
        out: "internal/database"
        overrides:
          - db_type: "phone"
            go_type:
              import: "github.com/huangmatty/crumbs/internal/psql_types"
              type: "Phone"
          - db_type: "money"
            go_type:
              import: "github.com/huangmatty/crumbs/internal/psql_types"
              type: "Money"